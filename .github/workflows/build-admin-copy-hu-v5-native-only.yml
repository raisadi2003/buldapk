name: Build ICE Admin v2.8.9.1 Copy HU v4 Native APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Extract source ZIP admin
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="./ice_v2891_admin_copy_hu_v5_native_only.zip"
          if [ ! -f "$ZIP_FILE" ]; then
            echo "ERROR: File ice_v2891_admin_copy_hu_v5_native_only.zip tidak ditemukan di halaman utama repository."
            ls -la
            exit 1
          fi
          echo "Memakai ZIP: $ZIP_FILE"
          rm -rf src
          mkdir -p src
          unzip -q "$ZIP_FILE" -d src
          PROJECT_FILE=$(find src -type f \( -name settings.gradle -o -name settings.gradle.kts \) | head -n 1)
          if [ -z "${PROJECT_FILE:-}" ]; then
            echo "ERROR: settings.gradle tidak ditemukan di dalam ZIP."
            find src -maxdepth 3 -type f | head -n 100
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Folder proyek: $PROJECT_DIR"

      - name: Build dan sign APK admin
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          chmod +x build_admin.sh
          ./build_admin.sh
          mkdir -p "$GITHUB_WORKSPACE/out"
          APK_FILE=$(find . -type f -iname '*admin*.apk' | sort -V | tail -n 1)
          if [ -z "${APK_FILE:-}" ]; then
            echo "ERROR: APK Admin tidak ditemukan setelah build."
            exit 1
          fi
          APK_NAME=$(basename "$APK_FILE")
          cp "$APK_FILE" "$GITHUB_WORKSPACE/out/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: out/${{ env.APK_NAME }}
          if-no-files-found: error
